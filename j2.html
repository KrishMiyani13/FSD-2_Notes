<script>
    // Udsating Value of Existing Object Keys
    let Person = {name:"Rahul",age:22,city:"Ahmedabad"}
    console.log(Person.age)
    // Using  dot Notation 
        Person.age = 30
    console.log(Person.age)
    console.log(Person.city)
    // Using Bracket Notation
        Person["city"] = "Surat"
    console.log(Person.city)
    // Using Variabal Key 
    console.log(Person.name)
        let Key = "name"
        Person[Key] = "Krish"
    console.log(Person.name)
</script>

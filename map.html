<!DOCTYPE html>
<html>

<head>

<title>GreenSaarthi Navigation</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"
/>

<style>

body{
    margin:0;
    font-family:Arial;
}

#map{
    width:100%;
    height:100vh;
}

.panel{

    position:absolute;

    top:10px;
    left:10px;

    z-index:1000;

    background:white;

    padding:20px;

    border-radius:10px;

    width:320px;

    box-shadow:0 0 10px rgba(0,0,0,0.2);

}

input{

    width:95%;
    padding:10px;
    margin-bottom:10px;

}

button{

    padding:10px;
    margin:5px;
    cursor:pointer;

}

.stop{

    margin-bottom:10px;

}

</style>

</head>

<body>

<div class="panel">

<h2>GreenSaarthi Navigation</h2>

<button onclick="useLiveLocation()">
Use Live Location
</button>

<br><br>

<input
id="start"
placeholder="Start Location"
/>

<div id="stopsContainer"></div>

<button onclick="addStop()">
Add Stop
</button>

<br><br>

<input
id="destination"
placeholder="Destination"
/>

<button onclick="createRoute()">
Create Route
</button>

</div>

<div id="map"></div>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<script
src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js">
</script>

<script>


const allSignals = [];
// ==========================
// MAP
// ==========================

const map = L.map('map').setView(
    [23.0225,72.5714],
    13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);



// ==========================
// ROUTE CONTROL
// ==========================

let routingControl = null;



// ==========================
// ADD STOP INPUT
// ==========================

let stopCount = 0;

function addStop(){

    stopCount++;

    const div =
        document.createElement("div");

    div.className = "stop";

    div.innerHTML = `
        <input
        id="stop${stopCount}"
        placeholder="Stop ${stopCount}"
        />
    `;

    document
    .getElementById(
        "stopsContainer"
    )
    .appendChild(div);

}



// ==========================
// LIVE LOCATION
// ==========================

function useLiveLocation(){

    navigator.geolocation
    .getCurrentPosition(position => {

        const lat =
            position.coords.latitude;

        const lon =
            position.coords.longitude;

        reverseGeocode(lat,lon);

    });

}



// ==========================
// REVERSE GEOCODE
// ==========================

function reverseGeocode(lat,lon){

    fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
    )

    .then(response => response.json())

    .then(data => {

        document
        .getElementById("start")
        .value =
            data.display_name;

    });

}



// ==========================
// SEARCH LOCATION
// ==========================

async function searchLocation(place){

    const response =
        await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${place}`
        );

    const data =
        await response.json();

    if(data.length > 0){

        return L.latLng(
            data[0].lat,
            data[0].lon
        );

    }

    return null;

}



// ==========================
// CREATE ROUTE
// ==========================

async function createRoute(){

    let waypoints = [];



    const start =
        document.getElementById(
            "start"
        ).value;

    const startCoords =
        await searchLocation(start);

    if(startCoords){

        waypoints.push(startCoords);

    }



    for(let i=1;i<=stopCount;i++){

        const stopValue =
            document.getElementById(
                `stop${i}`
            ).value;

        if(stopValue){

            const stopCoords =
                await searchLocation(
                    stopValue
                );

            if(stopCoords){

                waypoints.push(stopCoords);

            }

        }

    }



    const destination =
        document.getElementById(
            "destination"
        ).value;

    const destinationCoords =
        await searchLocation(
            destination
        );

    if(destinationCoords){

        waypoints.push(
            destinationCoords
        );

    }



    if(routingControl){

        map.removeControl(
            routingControl
        );

    }



   routingControl =
    L.Routing.control({

        router: L.Routing.osrmv1({

            serviceUrl:
            'https://router.project-osrm.org/route/v1'

        }),

        waypoints: waypoints,

        routeWhileDragging:false,

        lineOptions:{
            styles:[{
                color:'blue',
                weight:6
            }]
        }

    }).addTo(map);



routingControl.on('routesfound', function(e){

    const routeCoords =
        e.routes[0].coordinates;
console.log("Route Found");
    console.log(routeCoords.length);

    showSignalsOnRoute(routeCoords);

});

}



// ==========================
// JUNCTION STORAGE
// ==========================

const junctions = {};



// ==========================
// LOAD SIGNALS
// ==========================

fetch("restructured_signals.geojson")

.then(response => response.json())

.then(data => {

    data.features.forEach(feature => {

        const coords =
            feature.geometry.coordinates;

        const props =
            feature.properties;

        const junctionId =
            props.junction_id;

        const direction =
            props.direction;



        if(!junctions[junctionId]){

            junctions[junctionId] = {

                markers:{},

                directions:[
                    "north",
                    "east",
                    "south",
                    "west"
                ],

                currentIndex:0,

                timer:20

            };

        }



        const marker =
    L.circleMarker(
        [coords[1],coords[0]],
        {
            radius:7,
            color:'red',
            fillColor:'red',
            fillOpacity:0.9
        }
    );

junctions[junctionId].markers[direction] = marker;

allSignals.push({
    marker: marker,
    lat: coords[1],
    lng: coords[0],
    junctionId: junctionId,
    direction: direction
});



        junctions[
            junctionId
        ].markers[
            direction
        ] = marker;

    });


if(allSignals.length === 0) return;
    startTrafficSystem();

});

function showSignalsOnRoute(routeCoords){

    // Remove old markers
    allSignals.forEach(signal => {

        if(map.hasLayer(signal.marker)){
            map.removeLayer(signal.marker);
        }

    });

    const routeSignals = [];
    const addedJunctions = new Set();

    allSignals.forEach(signal => {

        let nearestIndex = -1;

        for(let i = 0; i < routeCoords.length; i++){

            const point = routeCoords[i];

            const distance = map.distance(
                [signal.lat, signal.lng],
                [point.lat, point.lng]
            );

            // Route must almost pass through signal
            if(distance <= 30){

                nearestIndex = i;
                break;

            }

        }

        if(
            nearestIndex !== -1 &&
            !addedJunctions.has(signal.junctionId)
        ){

            addedJunctions.add(
                signal.junctionId
            );

            routeSignals.push({

                marker: signal.marker,

                junctionId:
                    signal.junctionId,

                lat: signal.lat,

                lng: signal.lng,

                routeIndex:
                    nearestIndex

            });

        }

    });

    // Sort signals in travel order
    routeSignals.sort((a,b) => {

        return (
            a.routeIndex -
            b.routeIndex
        );

    });

    console.clear();

    console.log(
        "Signals Driver Will Cross"
    );

    routeSignals.forEach((signal,index) => {

        signal.marker.addTo(map);

        console.log(
            `${index + 1}. Junction ${signal.junctionId}`
        );

    });

    console.log(
        "Total Signals:",
        routeSignals.length
    );

}

// ==========================
// START TRAFFIC SYSTEM
// ==========================

function startTrafficSystem(){

    setInterval(() => {

        const allTimings =
            JSON.parse(
                localStorage.getItem(
                    "junctionTimings"
                )
            ) || {};



        Object.keys(junctions)
        .forEach(junctionId => {

            const junction =
                junctions[junctionId];



            const timings =
                allTimings[junctionId] || {

                    north:20,
                    east:20,
                    south:20,
                    west:20

                };



            const currentGreen =
                junction.directions[
                    junction.currentIndex
                ];



            Object.keys(
                junction.markers
            ).forEach(direction => {

                const marker =
                    junction.markers[
                        direction
                    ];



                if(direction === currentGreen){

                    marker.setStyle({

                        color:'green',
                        fillColor:'green'

                    });

                }

                else{

                    marker.setStyle({

                        color:'red',
                        fillColor:'red'

                    });

                }



                marker.bindTooltip(
                    `
                    ${junctionId}
                    <br>
                    ${direction.toUpperCase()}
                    <br>
                    ${
                        direction === currentGreen
                        ? "🟢 GREEN"
                        : "🔴 RED"
                    }
                    <br>
                    ${junction.timer}s
                    `,
                    {
                        permanent:false
                    }
                );

            });



            junction.timer--;



            if(junction.timer <= 0){

                junction.currentIndex++;



                if(
                    junction.currentIndex >=
                    junction.directions.length
                ){

                    junction.currentIndex = 0;

                }



                const nextDirection =
                    junction.directions[
                        junction.currentIndex
                    ];



                junction.timer =
                    timings[nextDirection];

            }

        });

    },1000);

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Document</title>
</head>

<body>

<p id="abc"></p>

<script>

let size = 15

setInterval(fun, 1000)

function fun() {

    document.getElementById("abc").innerHTML = "Hello World"

    document.getElementById("abc").style.color = "red"

    if(size > 3){
        size++
    }

    document.getElementById("abc").style.fontSize = size + "px"
}

</script>

</body>
</html>
